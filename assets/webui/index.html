<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QiYan</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1720; --panel:#17212b; --line:#26333f; --muted:#8aa0b0; --accent:#16877f; --text:#e6eef2; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; }
  #sidebar { width:300px; border-right:1px solid var(--line); background:var(--panel); display:flex; flex-direction:column; }
  #sidebar h1 { font-size:15px; margin:0; padding:14px 16px; border-bottom:1px solid var(--line); }
  #sessions { overflow-y:auto; flex:1; }
  .session { padding:10px 16px; border-bottom:1px solid var(--line); cursor:pointer; }
  .session:hover { background:#1e2b36; }
  .session.active { background:#22323e; border-left:3px solid var(--accent); }
  .session .name { font-weight:600; }
  .session .meta { color:var(--muted); font-size:12px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .idle { background:#3f7; } .active-turn { background:#fb3; } .other { background:#789; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #header { padding:12px 18px; border-bottom:1px solid var(--line); font-weight:600; }
  #transcript { flex:1; overflow-y:auto; padding:16px 18px; }
  .msg { border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:10px; white-space:pre-wrap; word-break:break-word; }
  .msg .when { color:var(--muted); font-size:11px; margin-bottom:4px; }
  #composer { border-top:1px solid var(--line); padding:12px 18px; display:flex; gap:8px; }
  #text { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; resize:none; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:8px 16px; cursor:pointer; font-weight:600; }
  #status { color:var(--muted); font-size:12px; padding:6px 18px; border-top:1px solid var(--line); }
</style>
</head>
<body>
<div id="sidebar">
  <h1>QiYan · sessions</h1>
  <div id="sessions"></div>
</div>
<div id="main">
  <div id="header">Select a session, or send to the assistant</div>
  <div id="transcript"></div>
  <div id="composer">
    <textarea id="text" rows="2" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send">Send</button>
  </div>
  <div id="status">connecting…</div>
</div>
<script>
const token = new URLSearchParams(location.search).get("token") || "";
const api = (p, opts) => fetch(p, { credentials: "same-origin", ...opts }).then((r) => r.ok ? r.json() : r.json().then((e) => Promise.reject(e)));
let sessions = [], selected = null; // null = the assistant

const statusEl = document.getElementById("status");
const setStatus = (s) => { statusEl.textContent = s; };

function renderSessions() {
  const el = document.getElementById("sessions");
  const rows = [{ nickname: null, label: "◆ assistant", meta: "the QiYan brain" }].concat(
    sessions.map((s) => ({ nickname: s.nickname, label: s.nickname, meta: `${s.provider} · ${s.goal ? "goal:" + s.goal.status : (s.nativeStatus || "—")}`, status: s.nativeStatus })));
  el.innerHTML = "";
  for (const r of rows) {
    const d = document.createElement("div");
    d.className = "session" + (selected === r.nickname ? " active" : "");
    const cls = r.nickname === null ? "other" : r.status === "idle" ? "idle" : r.status && r.status !== "idle" ? "active-turn" : "other";
    d.innerHTML = `<div class="name"><span class="dot ${cls}"></span>${escapeHtml(r.label)}</div><div class="meta">${escapeHtml(r.meta || "")}</div>`;
    d.onclick = () => selectSession(r.nickname);
    el.appendChild(d);
  }
}
function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

async function selectSession(nickname) {
  selected = nickname;
  document.getElementById("header").textContent = nickname === null ? "Assistant" : `Worker: ${nickname}`;
  renderSessions();
  await refreshTranscript();
}

async function refreshTranscript() {
  const t = document.getElementById("transcript");
  if (selected === null) { t.innerHTML = `<div class="msg"><div class="when">assistant</div>Send a message to the assistant. Its replies stream in below.</div>`; return; }
  try {
    const { messages } = await api(`/api/sessions/${selected}/messages?count=20`);
    t.innerHTML = messages.length ? "" : `<div class="msg">No final messages yet from ${escapeHtml(selected)}.</div>`;
    for (const m of messages) {
      const d = document.createElement("div"); d.className = "msg";
      d.innerHTML = `<div class="when">${new Date(m.completedAt).toLocaleString()} · ${escapeHtml(m.terminalStatus)}</div>${escapeHtml(m.body)}`;
      t.appendChild(d);
    }
    t.scrollTop = t.scrollHeight;
  } catch (e) { t.innerHTML = `<div class="msg">Error: ${escapeHtml(e.error || e.message || e)}</div>`; }
}

function appendAssistantMessage(body) {
  if (selected !== null) return; // assistant replies only shown on the assistant view
  const t = document.getElementById("transcript");
  const d = document.createElement("div"); d.className = "msg";
  d.innerHTML = `<div class="when">assistant · ${new Date().toLocaleTimeString()}</div>${escapeHtml(body)}`;
  t.appendChild(d); t.scrollTop = t.scrollHeight;
}

async function send() {
  const ta = document.getElementById("text");
  const text = ta.value.trim();
  if (!text) return;
  ta.value = "";
  if (selected === null) appendAssistantMessage("→ " + text);
  try { const r = await api("/api/input", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ text, target: selected || undefined }) });
    if (!r.ok) setStatus("send failed: " + (r.error || "")); else setStatus("sent"); }
  catch (e) { setStatus("send error: " + (e.error || e.message || e)); }
  if (selected !== null) setTimeout(refreshTranscript, 800);
}

document.getElementById("send").onclick = send;
document.getElementById("text").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

async function loadSessions() { try { sessions = (await api("/api/sessions")).sessions; renderSessions(); } catch (e) { setStatus("load error: " + (e.error || e.message || e)); } }

function connectWs() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);
  ws.onopen = () => setStatus("live");
  ws.onclose = () => { setStatus("disconnected — retrying…"); setTimeout(connectWs, 2000); };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === "sessions") { sessions = m.sessions; renderSessions(); if (selected !== null) refreshTranscript(); }
    else if (m.type === "message") appendAssistantMessage(m.body);
  };
}

loadSessions();
selectSession(null);
connectWs();
</script>
</body>
</html>
